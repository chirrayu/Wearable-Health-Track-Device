<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="leaflet.css" />
    <script src="leaflet.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { height: 100%; }
        body { height: 100%; background-color: #07111F; }
        #map { width: 100%; height: 100%; min-height: 400px; }

        /* Legend */
        .legend {
            position: absolute;
            bottom: 20px;
            left: 10px;
            background: rgba(7, 17, 31, 0.85);
            border: 1px solid #1a3a5c;
            border-radius: 8px;
            padding: 8px 14px;
            z-index: 1000;
            display: flex;
            gap: 16px;
            align-items: center;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
            color: white;
            font-size: 13px;
            font-family: sans-serif;
        }

        .legend-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }

        /* LIVE badge */
        .live-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background: transparent;
            border: 2px solid #00ff88;
            color: #00ff88;
            font-family: sans-serif;
            font-size: 13px;
            font-weight: bold;
            padding: 4px 10px;
            border-radius: 4px;
            z-index: 1000;
            letter-spacing: 1px;
        }

        /* Title */
        .map-title {
            position: absolute;
            top: 12px;
            left: 14px;
            color: white;
            font-family: sans-serif;
            font-size: 15px;
            font-weight: bold;
            z-index: 1000;
            letter-spacing: 1px;
        }

        /* Dot styles */
        .dot {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.3);
            box-shadow: 0 0 8px currentColor;
        }

        .dot-stable   { background: #00e676; color: #00e676; }
        .dot-serious  { background: #ffd600; color: #ffd600; }
        .dot-critical { background: #ff1744; color: #ff1744; }
        .dot-offline  { background: #757575; color: #757575; }
    </style>
</head>
<body>

<div id="map"></div>

<!-- Overlays -->
<div class="map-title">BATTLEFIELD MAP</div>
<div class="live-badge">LIVE</div>

<div class="legend">
    <div class="legend-item">
        <div class="legend-dot" style="background:#00e676;"></div> Stable
    </div>
    <div class="legend-item">
        <div class="legend-dot" style="background:#ffd600;"></div> Serious
    </div>
    <div class="legend-item">
        <div class="legend-dot" style="background:#ff1744;"></div> Critical
    </div>
    <div class="legend-item">
        <div class="legend-dot" style="background:#757575;"></div> Offline
    </div>
</div>

<script>

    // ─── Map Setup ───────────────────────────────────────────
    var map = L.map('map', {
        center: [28.6139, 77.2090],
        zoom: 13,
        zoomControl: true
    });

    L.tileLayer(
        'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
        { attribution: '© OpenStreetMap', maxZoom: 19 }
    ).addTo(map);


    // ─── Dot Icon Factory ────────────────────────────────────
    function createDotIcon(status) {
        var colors = {
            stable:   '#00e676',
            serious:  '#ffd600',
            critical: '#ff1744',
            offline:  '#757575'
        };

        var color = colors[status] || '#ffffff';

        return L.divIcon({
            className: '',
            html:
                '<div style="' +
                    'width:18px;' +
                    'height:18px;' +
                    'border-radius:50%;' +
                    'background:' + color + ';' +
                    'border:2px solid rgba(255,255,255,0.3);' +
                    'box-shadow:0 0 10px ' + color + ';' +
                '"></div>',
            iconSize:   [18, 18],
            iconAnchor: [9, 9],
            popupAnchor:[0, -10]
        });
    }


    // ─── People Data ─────────────────────────────────────────
    var people = [
        { id: 'P1', name: 'Soldier Alpha',   status: 'stable',   lat: 28.6200, lng: 77.2100 },
        { id: 'P2', name: 'Soldier Bravo',   status: 'stable',   lat: 28.6150, lng: 77.2200 },
        { id: 'P3', name: 'Soldier Charlie', status: 'stable',   lat: 28.6180, lng: 77.2000 },
        { id: 'P4', name: 'Soldier Delta',   status: 'serious',  lat: 28.6100, lng: 77.2300 },
        { id: 'P5', name: 'Soldier Echo',    status: 'serious',  lat: 28.6050, lng: 77.2150 },
        { id: 'P6', name: 'Soldier Foxtrot', status: 'critical', lat: 28.6120, lng: 77.2250 },
        { id: 'P7', name: 'Soldier Golf',    status: 'offline',  lat: 28.6080, lng: 77.1950 },
        { id: 'P8', name: 'Soldier Hotel',   status: 'stable',   lat: 28.6220, lng: 77.2350 }
    ];


    // ─── Create Markers ──────────────────────────────────────
    var markers = {};

    people.forEach(function(person) {
        var marker = L.marker(
            [person.lat, person.lng],
            {
                icon: createDotIcon(person.status),
                draggable: true           // ← makes dots moveable
            }
        ).addTo(map);

        marker.bindPopup(
            '<b>' + person.name + '</b><br>' +
            'Status: ' + person.status.toUpperCase() +
            '<br>ID: ' + person.id
        );

        // Save new position when dragged
        marker.on('dragend', function(e) {
            var pos = e.target.getLatLng();
            console.log(
                person.id + ' moved to ' +
                pos.lat.toFixed(5) + ', ' + pos.lng.toFixed(5)
            );
        });

        markers[person.id] = marker;
    });


    // ─── Update a person's position from Kotlin ──────────────
    // Call: updatePosition('P1', 28.6210, 77.2110)
    function updatePosition(id, lat, lng) {
        if (markers[id]) {
            markers[id].setLatLng([lat, lng]);
        }
    }

    // ─── Update a person's status from Kotlin ────────────────
    // Call: updateStatus('P1', 'critical')
    function updateStatus(id, status) {
        if (markers[id]) {
            markers[id].setIcon(createDotIcon(status));
        }
    }

</script>

</body>
</html>
